server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ecommerce
    password: ecommerce123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 数据库字段 user_name 自动映射到 Java 字段 userName
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  # 签名密钥（生产环境应从环境变量读取）
  secret: ecommerce-course-secret-key-must-be-at-least-32-chars
  # Token 有效期：24小时（毫秒）
  expiration: 86400000
