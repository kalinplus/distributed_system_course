# Docker Compose for E-commerce Distributed System
# Step 5: Full Container Orchestration with JMeter Testing

services:
  # -----------------------------------------------
  # Nginx Gateway
  # -----------------------------------------------
  nginx:
    image: nginx:1.24
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - product-service-1
      - product-service-2
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # MySQL
  # -----------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Redis
  # -----------------------------------------------
  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # MySQL Slave (Read Replica)
  # -----------------------------------------------
  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_slave_data:/var/lib/mysql
    command: >
      --server-id=2
      --read-only=ON
      --log-bin=mysql-bin
      --binlog-format=ROW
      --skip-name-resolve
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Product Service - Instance 1
  # -----------------------------------------------
  product-service-1:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service-1
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - APP_INSTANCE_ID=product-service-1
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode=true&characterEncoding=utf8
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=redis123
      - SERVER_PORT=8082
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/products/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Product Service - Instance 2
  # -----------------------------------------------
  product-service-2:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service-2
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - APP_INSTANCE_ID=product-service-2
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode=true&characterEncoding=utf8
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=redis123
      - SERVER_PORT=8082
    ports:
      - "8083:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/products/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # User Service
  # -----------------------------------------------
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode&characterEncoding=utf8
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/users/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Inventory Service
  # -----------------------------------------------
  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=mySecretKey12345678901234567890123456789012345678901234567890
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode&characterEncoding=utf8
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/api/inventory/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Order Service
  # -----------------------------------------------
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=mySecretKey12345678901234567890123456789012345678901234567890
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode&characterEncoding=utf8
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/api/orders/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # ElasticSearch
  # -----------------------------------------------
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

# Networks
networks:
  ecommerce-net:
    driver: bridge

# Volumes
volumes:
  mysql_data:
  redis_data:
  mysql_slave_data:
  es_data:
