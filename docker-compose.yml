  #     - es_data:/usr/share/elasticsearch/data
  #   networks:
 #     - ecommerce-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5

# Networks
networks:
  ecommerce-net:
    driver: bridge

# Volumes
volumes:
  mysql_data:
  redis_data:
  mysql_slave_data:
  # es_data:
