# Docker Compose for E-commerce Distributed System
# Step 5: Full Container Orchestration with JMeter Testing

# 全局 DNS 配置（解决 OrbStack DNS 同步问题）
x-default-dns: &default-dns
  dns:
    - 8.8.8.8
    - 114.114.114.114

services:
  # -----------------------------------------------
  # Nginx Gateway
  # -----------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - product-service-1
      - product-service-2
    networks:
      - ecommerce-net
    dns:
      - 8.8.8.8
      - 114.114.114.114
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # MySQL
  # -----------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Redis
  # -----------------------------------------------
  redis:
    image: redis:7.4
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # MySQL Slave (Read Replica)
  # -----------------------------------------------
  mysql-slave:
    image: mysql:8.4
    container_name: mysql-slave
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_slave_data:/var/lib/mysql
    command: >
      --server-id=2
      --read-only=ON
      --log-bin=mysql-bin
      --binlog-format=ROW
      --skip-name-resolve
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Product Service - Instance 1
  # -----------------------------------------------
  product-service-1:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service-1
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - APP_INSTANCE_ID=product-service-1
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode=true&characterEncoding=utf8
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=redis123
      - SERVER_PORT=8082
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/products/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Product Service - Instance 2
  # -----------------------------------------------
  product-service-2:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service-2
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - APP_INSTANCE_ID=product-service-2
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode=true&characterEncoding=utf8
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=redis123
      - SERVER_PORT=8082
    ports:
      - "8083:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/products/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # User Service
  # -----------------------------------------------
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode&characterEncoding=utf8
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/users/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Inventory Service
  # -----------------------------------------------
  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=mySecretKey12345678901234567890123456789012345678901234567890
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode&characterEncoding=utf8
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/api/inventory/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Order Service
  # -----------------------------------------------
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=mySecretKey12345678901234567890123456789012345678901234567890
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ecommerce?useUnicode&characterEncoding=utf8
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/api/orders/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Zookeeper (for Kafka)
  # -----------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------
  # Kafka
  # -----------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # ElasticSearch (暂时禁用，需要 elasticsearch:8.11.0 镜像)
  # -----------------------------------------------
  # elasticsearch:
  #   image: elasticsearch:8.11.0
