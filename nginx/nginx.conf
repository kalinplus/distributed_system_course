# Nginx configuration for e-commerce system
# Static resource serving and dynamic API proxy with load balancing

# Worker process configuration
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with upstream address
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;

    # Sendfile and keepalive optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # ============================================
    # Upstream: product-service (Round Robin)
    # ============================================
    upstream product-service-round-robin {
        # Default load balancing: round robin
        server product-service-1:8082;
        server product-service-2:8082;
    }

    # ============================================
    # Upstream: product-service (Least Connections)
    # ============================================
    upstream product-service-least-conn {
        least_conn;
        server product-service-1:8082;
        server product-service-2:8082;
    }

    # ============================================
    # Server: Main entry point
    # ============================================
    server {
        listen 80;
        server_name localhost;

        # Root directory for static resources
        root /usr/share/nginx/html;
        index index.html;

        # Static resources - directly serve from filesystem
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static files with explicit caching
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # API proxy - Round Robin (default)
        location /api/ {
            # Switch between strategies by commenting/uncommenting:
            # Round Robin (default):
            proxy_pass http://product-service-round-robin;
            # Least Connections:
            # proxy_pass http://product-service-least-conn;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            return 200 'nginx healthy';
            add_header Content-Type text/plain;
        }
    }
}
